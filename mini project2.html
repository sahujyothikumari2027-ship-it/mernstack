<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Disaster Relief Coordination System</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>Disaster Relief Coordination System</h1>
    <p>Together We Can Help Communities Recover</p>
</header>

<nav>
    <a href="#">Home</a>
    <a href="#">Volunteers</a>
    <a href="#">Requests</a>
    <a href="#">Contact</a>
</nav>

<div class="container">

    <div class="card">
        <h2>Volunteer Registration</h2>

        <input type="text" placeholder="Full Name">

        <input type="email" placeholder="Email Address">

        <input type="text" placeholder="City">

        <input type="tel" placeholder="Phone Number">

        <button>Register</button>
    </div>

    <div class="card">
        <h2>Resource Request</h2>

        <input type="text" placeholder="Requester Name">

        <input type="text" placeholder="Required Item">

        <input type="number" placeholder="Quantity Needed">

        <textarea placeholder="Address"></textarea>

        <button>Submit Request</button>
    </div>

</div>

<footer>
    <p>© 2026 Disaster Relief Coordination System</p>
</footer>

</body>
</html>
